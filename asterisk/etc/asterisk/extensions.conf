[general]
static=yes
writeprotect=no
clearglobalvars=no

[globals]
ROUTING_URL=http://voip-oncall-router:8080/api/routing/current.txt

[inbound-from-provider]
exten => _X.,1,NoOp(Inbound call for ${EXTEN} from provider)
 same => n,Set(__ORIG_CID_NUM=${CALLERID(num)})
 same => n,Set(__ORIG_CID_NAME=${CALLERID(name)})
 same => n,NoOp(Original caller is ${ORIG_CID_NAME} <${ORIG_CID_NUM}>)
 same => n,Set(TARGET=${CURL(${ROUTING_URL}?token=${ENV(ROUTING_API_TOKEN)})})
 same => n,Set(TARGET=${FILTER(0-9+,${TARGET})})
 same => n,NoOp(Routing target is ${TARGET})
 same => n,Set(TARGET_LEN=${LEN(${TARGET})})
 same => n,NoOp(Routing target length is ${TARGET_LEN})
 same => n,GotoIf($[${TARGET_LEN} > 4]?dial_prep:route_fail)
 same => n(dial_prep),Set(CALLERID(num)=${ORIG_CID_NUM})
 same => n,Set(CALLERID(name)=${ORIG_CID_NAME})
 same => n,Set(CALLERID(num-pres)=allowed_not_screened)
 same => n(dial_target),Dial(PJSIP/${TARGET}@provider-outbound,45,b(set-cid-headers^s^1))
 same => n,Hangup()
 same => n(route_fail),Playback(all-circuits-busy-now)
 same => n,Hangup()

[set-cid-headers]
exten => s,1,NoOp(Setting outbound identity headers for ${ORIG_CID_NUM})
 same => n,Set(PJSIP_HEADER(add,P-Asserted-Identity)=<sip:${ORIG_CID_NUM}@${ENV(PROVIDER_HOST)}>)
 same => n,Set(PJSIP_HEADER(add,P-Preferred-Identity)=<sip:${ORIG_CID_NUM}@${ENV(PROVIDER_HOST)}>)
 same => n,Set(PJSIP_HEADER(add,Remote-Party-ID)=<sip:${ORIG_CID_NUM}@${ENV(PROVIDER_HOST)}>;party=calling;screen=no;privacy=off)
 same => n,Set(PJSIP_HEADER(add,Privacy)=none)
 same => n,Return()

[from-internal]
exten => _X.,1,NoOp(Outbound call ${EXTEN})
 same => n,Dial(PJSIP/${EXTEN}@provider-outbound,45)
 same => n,Hangup()
