[general]
static=yes
writeprotect=no
clearglobalvars=no

[globals]
ROUTING_URL=http://voip-oncall-router:8080/api/routing/current.txt

[inbound-from-provider]
exten => _X.,1,NoOp(Inbound call for ${EXTEN} from provider)
 same => n,Set(TARGET=${CURL(${ROUTING_URL}?token=${ENV(ROUTING_API_TOKEN)})})
 same => n,Set(TARGET=${FILTER(0-9+,${TARGET})})
 same => n,NoOp(Routing target is ${TARGET})
 same => n,GotoIf($["${LEN(${TARGET})}" > "4"]?dial_target:route_fail)
 same => n(dial_target),Dial(PJSIP/${TARGET}@provider-outbound,45)
 same => n,Hangup()
 same => n(route_fail),Playback(all-circuits-busy-now)
 same => n,Hangup()

[from-internal]
exten => _X.,1,NoOp(Outbound call ${EXTEN})
 same => n,Dial(PJSIP/${EXTEN}@provider-outbound,45)
 same => n,Hangup()
