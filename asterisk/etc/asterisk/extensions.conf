[general]
static=yes
writeprotect=no
clearglobalvars=no

[globals]
ROUTING_URL=http://voip-oncall-router:8080/api/routing/current.txt

[inbound-from-provider]
exten => _X.,1,NoOp(Inbound call for ${EXTEN} from provider)
 same => n,Set(__ORIG_DID=${FILTER(0-9+,${EXTEN})})
 same => n,Set(__ORIG_CID_NUM=${FILTER(0-9+,${CALLERID(num)})})
 same => n,Set(__ORIG_DID_E164=${FILTER(0-9,${ORIG_DID})})
 same => n,Set(__ORIG_CID_E164=${FILTER(0-9,${ORIG_CID_NUM})})
 same => n,Set(__ORIG_CID_NAME=${CALLERID(name)})
 same => n,NoOp(Original DID is ${ORIG_DID}; original caller is ${ORIG_CID_NAME} <${ORIG_CID_NUM}>)
 same => n,Set(TARGET=${CURL(${ROUTING_URL}?token=${ENV(ROUTING_API_TOKEN)})})
 same => n,Set(TARGET=${FILTER(0-9+,${TARGET})})
 same => n,NoOp(Routing target is ${TARGET})
 same => n,Set(TARGET_LEN=${LEN(${TARGET})})
 same => n,NoOp(Routing target length is ${TARGET_LEN})
 same => n,GotoIf($[${TARGET_LEN} > 4]?dial_prep:route_fail)
 same => n(dial_prep),Set(CALLERID(num)=${ORIG_CID_NUM})
 same => n,Set(CALLERID(name)=${ORIG_CID_NAME})
 same => n,Set(CALLERID(num-pres)=allowed_not_screened)
 same => n,Set(CONNECTEDLINE(num,i)=${ORIG_CID_NUM})
 same => n,Set(CONNECTEDLINE(name,i)=${ORIG_CID_NAME})
 same => n,Set(REDIRECTING(from-num,i)=${ORIG_DID_E164})
 same => n,Set(REDIRECTING(to-num,i)=${TARGET})
 same => n,Set(REDIRECTING(reason)=cfu)
 same => n(dial_target),Dial(PJSIP/${TARGET}@provider-outbound,45,b(set-original-caller^s^1))
 same => n,Hangup()
 same => n(route_fail),Playback(all-circuits-busy-now)
 same => n,Hangup()

[set-original-caller]
exten => s,1,NoOp(Setting outbound caller ID to ${ORIG_CID_NAME} <${ORIG_CID_NUM}>)
 same => n,Gosub(normalize-outbound-cli,s,1(${ORIG_CID_NUM}))
 same => n,Set(CALLERID(num)=${FILTER(0-9+,${GOSUB_RETVAL})})
 same => n,Set(CALLERID(name)=${FILTER(0-9+,${GOSUB_RETVAL})})
 same => n,Set(CALLERID(num-pres)=allowed_not_screened)
 same => n,Set(CONNECTEDLINE(num,i)=${CALLERID(num)})
 same => n,Set(CONNECTEDLINE(name,i)=${ORIG_CID_NAME})
 same => n,Set(REDIRECTING(from-num,i)=${ORIG_DID_E164})
 same => n,Set(REDIRECTING(to-num,i)=${FILTER(0-9+,${TARGET})})
 same => n,Set(REDIRECTING(reason)=cfu)
 same => n,Return()

[normalize-outbound-cli]
exten => s,1,NoOp(Normalizing outbound CLI ${ARG1})
 same => n,Set(NORMALIZED_CLI=${FILTER(0-9+,${ARG1})})
 same => n,Set(GOSUB_RETVAL=${IF($["${NORMALIZED_CLI:0:1}" = "+"]?${NORMALIZED_CLI:1}:${NORMALIZED_CLI})})
 same => n,Return()

[from-internal]
exten => _X.,1,NoOp(Outbound call ${EXTEN})
 same => n,Dial(PJSIP/${EXTEN}@provider-outbound,45)
 same => n,Hangup()
