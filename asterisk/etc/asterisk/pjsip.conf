[global]
type=global
user_agent=OnCall-Asterisk

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

[provider-auth]
type=auth
auth_type=userpass
username=${ENV(PROVIDER_USERNAME)}
password=${ENV(PROVIDER_PASSWORD)}

[provider-aor]
type=aor
contact=sip:${ENV(PROVIDER_HOST)}:5060

[provider-outbound]
type=endpoint
transport=transport-udp
context=from-internal
disallow=all
allow=ulaw,alaw
outbound_auth=provider-auth
aors=provider-aor
from_domain=${ENV(PROVIDER_HOST)}
trust_id_outbound=yes
send_pai=yes
send_rpid=yes
rpid_immediate=yes
send_diversion=yes
trust_connected_line=yes
send_connected_line=yes
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes

[provider-trunk-acl]
type=acl
deny=0.0.0.0/0.0.0.0
permit=34.105.170.20/32
permit=35.242.140.109/32
permit=34.105.214.80/32
permit=34.105.209.181/32

[provider-inbound]
type=endpoint
transport=transport-udp
context=inbound-from-provider
disallow=all
allow=ulaw,alaw
trust_id_inbound=yes
acl=provider-trunk-acl
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes

[provider-identify]
type=identify
endpoint=provider-inbound
match=34.105.170.20/32
match=35.242.140.109/32
match=34.105.214.80/32
match=34.105.209.181/32
