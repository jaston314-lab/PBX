services:
  voip-oncall-router:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voip-oncall-router
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - ENABLE_SIP_SERVER=false
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  asterisk-bridge:
    build:
      context: ./asterisk
      dockerfile: Dockerfile
    container_name: asterisk-bridge
    network_mode: host
    depends_on:
      - voip-oncall-router
    env_file:
      - .env
    environment:
      - ROUTING_URL=http://127.0.0.1:8080/api/routing/current.txt
    restart: unless-stopped
