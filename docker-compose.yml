services:
  voip-oncall-router:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voip-oncall-router
    ports:
      - "8080:8080"
      - "5060:5060/udp"
    env_file:
      - .env
    environment:
      - ENABLE_SIP_SERVER=true
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  asterisk-bridge:
    build:
      context: ./asterisk
      dockerfile: Dockerfile
    container_name: asterisk-bridge
    depends_on:
      - voip-oncall-router
    env_file:
      - .env
    ports:
      - "10000-10100:10000-10100/udp"
    restart: unless-stopped
