<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VoIP On-Call Router</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <style>
      :root {
        --bg-start: #eff5ec;
        --bg-end: #d7e6de;
        --card-bg: #ffffff;
        --accent: #17452f;
        --accent-soft: #2c7652;
      }

      body {
        min-height: 100vh;
        background: radial-gradient(circle at top left, var(--bg-start), var(--bg-end));
      }

      .dashboard-card {
        background: var(--card-bg);
        border: 0;
        border-radius: 1rem;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      }

      .app-title {
        color: var(--accent);
        letter-spacing: 0.04em;
      }

      .section-title {
        color: var(--accent-soft);
        font-weight: 700;
      }

      .clock-wrap {
        text-align: right;
      }

      .clock-time {
        font-size: 1.2rem;
        font-weight: 700;
        color: var(--accent);
      }

      .calendar-table {
        table-layout: fixed;
      }

      .calendar-cell {
        min-height: 180px;
        vertical-align: top;
        background: #fff;
      }

      .calendar-cell.muted {
        background: #f4f7f4;
      }

      .day-number {
        font-size: 1.1rem;
        font-weight: 700;
        color: var(--accent);
      }

      .calendar-card {
        font-size: 0.84rem;
      }

      .calendar-card label {
        font-size: 0.74rem;
        margin-bottom: 0.2rem;
        color: #4d5d54;
      }

      .tiny-select {
        font-size: 0.8rem;
        min-width: 160px;
      }
    </style>
  </head>
  <body>
    <main class="container py-5">
      <div class="row justify-content-center">
        <div class="col-12 col-xl-11">
          <div class="dashboard-card card p-4 p-md-5">
            <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-2">
              <div>
                <h1 class="app-title h3 mb-1">VoIP On-Call Router</h1>
                <p class="text-muted mb-0">Manage UK users, monthly rota, and time sync.</p>
              </div>
              <div class="clock-wrap">
                <div id="digitalClock" class="clock-time">--:--:--</div>
                <div class="small text-muted">
                  <span id="clockSource">clock source: system</span>
                </div>
              </div>
            </div>

            <div id="alertBox" class="alert d-none" role="alert"></div>

            <section class="mb-5">
              <div class="d-flex justify-content-between align-items-center mb-3">
                <h2 class="h5 section-title mb-0">Engineer Management</h2>
                <button id="refreshBtn" class="btn btn-outline-success btn-sm">Refresh</button>
              </div>

              <form id="addEngineerForm" class="row gy-2 gx-2 align-items-end mb-3">
                <div class="col-12 col-md-4">
                  <label for="newEngineerName" class="form-label">Name</label>
                  <input id="newEngineerName" class="form-control" maxlength="100" required />
                </div>
                <div class="col-12 col-md-4">
                  <label for="newEngineerMobile" class="form-label">UK Mobile</label>
                  <input
                    id="newEngineerMobile"
                    class="form-control"
                    placeholder="07xxxxxxxxx or +447xxxxxxxxx"
                    required
                  />
                </div>
                <div class="col-12 col-md-4">
                  <button class="btn btn-success" type="submit">Add Engineer</button>
                </div>
              </form>

              <div class="table-responsive">
                <table class="table align-middle">
                  <thead>
                    <tr>
                      <th>Order</th>
                      <th>Name</th>
                      <th>UK Mobile</th>
                      <th>Status</th>
                      <th class="text-end">Actions</th>
                    </tr>
                  </thead>
                  <tbody id="engineersBody"></tbody>
                </table>
              </div>
            </section>

            <section>
              <h2 class="h5 section-title mb-3">Monthly Rota Calendar</h2>

              <div class="row g-3 align-items-end mb-3">
                <div class="col-12 col-md-3">
                  <label for="rotaStartDate" class="form-label">Rota Start Date</label>
                  <input id="rotaStartDate" type="date" class="form-control" />
                </div>
                <div class="col-12 col-md-2">
                  <button id="saveRotaStartBtn" class="btn btn-success w-100" type="button">Save Start</button>
                </div>
                <div class="col-12 col-md-7">
                  <div class="d-flex gap-2 justify-content-md-end">
                    <button id="prevMonthBtn" class="btn btn-outline-success" type="button">Previous Month</button>
                    <div id="monthLabel" class="px-3 py-2 border rounded bg-light">Month</div>
                    <button id="nextMonthBtn" class="btn btn-outline-success" type="button">Next Month</button>
                  </div>
                </div>
              </div>

              <div class="row g-2 align-items-end mb-3">
                <div class="col-12 col-md-3">
                  <label for="weekOverrideStart" class="form-label">Week Override (Monday)</label>
                  <input id="weekOverrideStart" type="date" class="form-control" />
                </div>
                <div class="col-12 col-md-4">
                  <label for="weekOverrideEngineer" class="form-label">Assigned Engineer</label>
                  <select id="weekOverrideEngineer" class="form-select"></select>
                </div>
                <div class="col-12 col-md-2">
                  <button id="applyWeekOverrideBtn" class="btn btn-warning w-100" type="button">Apply Week</button>
                </div>
              </div>

              <div class="table-responsive">
                <table class="table table-bordered calendar-table">
                  <thead class="table-light">
                    <tr>
                      <th>Mon</th>
                      <th>Tue</th>
                      <th>Wed</th>
                      <th>Thu</th>
                      <th>Fri</th>
                      <th>Sat</th>
                      <th>Sun</th>
                    </tr>
                  </thead>
                  <tbody id="calendarBody"></tbody>
                </table>
              </div>
            </section>
          </div>
        </div>
      </div>
    </main>

    <script>
      const engineersBody = document.getElementById('engineersBody');
      const calendarBody = document.getElementById('calendarBody');
      const alertBox = document.getElementById('alertBox');
      const refreshBtn = document.getElementById('refreshBtn');
      const addEngineerForm = document.getElementById('addEngineerForm');
      const newEngineerName = document.getElementById('newEngineerName');
      const newEngineerMobile = document.getElementById('newEngineerMobile');
      const rotaStartDateInput = document.getElementById('rotaStartDate');
      const monthLabel = document.getElementById('monthLabel');
      const prevMonthBtn = document.getElementById('prevMonthBtn');
      const nextMonthBtn = document.getElementById('nextMonthBtn');
      const weekOverrideStart = document.getElementById('weekOverrideStart');
      const weekOverrideEngineer = document.getElementById('weekOverrideEngineer');
      const applyWeekOverrideBtn = document.getElementById('applyWeekOverrideBtn');
      const saveRotaStartBtn = document.getElementById('saveRotaStartBtn');
      const digitalClock = document.getElementById('digitalClock');
      const clockSource = document.getElementById('clockSource');

      let state = {
        engineers: [],
        month: null,
        monthData: null,
        clockServerMsAtSync: null,
        clockLocalMsAtSync: null
      };

      function pad2(value) {
        return String(value).padStart(2, '0');
      }

      function todayIso() {
        return new Date().toISOString().slice(0, 10);
      }

      function toYearMonth(date) {
        return `${date.getUTCFullYear()}-${pad2(date.getUTCMonth() + 1)}`;
      }

      function shiftMonth(month, delta) {
        const [year, mon] = month.split('-').map(Number);
        const shifted = new Date(Date.UTC(year, mon - 1 + delta, 1));
        return toYearMonth(shifted);
      }

      function toMonday(dateString) {
        const date = new Date(`${dateString}T00:00:00Z`);
        const day = date.getUTCDay();
        const delta = day === 0 ? -6 : 1 - day;
        date.setUTCDate(date.getUTCDate() + delta);
        return date.toISOString().slice(0, 10);
      }

      function setAlert(message, type) {
        if (!message) {
          alertBox.className = 'alert d-none';
          alertBox.textContent = '';
          return;
        }

        alertBox.className = `alert alert-${type}`;
        alertBox.textContent = message;
      }

      function normalizeUkMobileInput(value) {
        if (!value || typeof value !== 'string') {
          return null;
        }

        let cleaned = value.replace(/[^\d+]/g, '').trim();
        if (!cleaned) {
          return null;
        }

        if (cleaned.startsWith('+44')) {
          cleaned = cleaned.slice(3);
        } else if (cleaned.startsWith('44')) {
          cleaned = cleaned.slice(2);
        } else if (cleaned.startsWith('0')) {
          cleaned = cleaned.slice(1);
        }

        if (!/^7\d{9}$/.test(cleaned)) {
          return null;
        }

        return `+44${cleaned}`;
      }

      async function apiFetch(url, options = {}) {
        const response = await fetch(url, {
          headers: {
            'Content-Type': 'application/json',
            ...(options.headers || {})
          },
          ...options
        });

        const payload = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(payload.error || 'Request failed');
        }

        return payload;
      }

      function engineerSelectOptions(selectedId, includeClearOption = true) {
        const clearOption = includeClearOption
          ? '<option value="">Use rolling rota (no override)</option>'
          : '';

        const options = state.engineers
          .map((engineer) => {
            const selected = Number(selectedId) === engineer.id ? 'selected' : '';
            return `<option value="${engineer.id}" ${selected}>${engineer.name}</option>`;
          })
          .join('');

        return `${clearOption}${options}`;
      }

      function renderWeekOverrideSelect() {
        weekOverrideEngineer.innerHTML = engineerSelectOptions('', true);
      }

      function renderEngineers() {
        engineersBody.innerHTML = '';

        state.engineers.forEach((engineer, index) => {
          const row = document.createElement('tr');
          const activeBadge = engineer.is_active
            ? '<span class="badge text-bg-success">Manual Active</span>'
            : '<span class="badge text-bg-secondary">Normal</span>';

          row.innerHTML = `
            <td>
              <div class="btn-group btn-group-sm" role="group">
                <button class="btn btn-outline-secondary" data-action="move-up" data-id="${engineer.id}" ${
                index === 0 ? 'disabled' : ''
              }>Up</button>
                <button class="btn btn-outline-secondary" data-action="move-down" data-id="${engineer.id}" ${
                index === state.engineers.length - 1 ? 'disabled' : ''
              }>Down</button>
              </div>
            </td>
            <td>
              <input class="form-control form-control-sm" data-field="name" data-id="${engineer.id}" value="${engineer.name}" maxlength="100" />
            </td>
            <td>
              <input class="form-control form-control-sm" data-field="mobile" data-id="${engineer.id}" value="${engineer.mobile_number_display || engineer.mobile_number}" />
            </td>
            <td>${activeBadge}</td>
            <td class="text-end">
              <button class="btn btn-sm btn-success" data-action="save" data-id="${engineer.id}">Save</button>
              <button class="btn btn-sm btn-outline-primary" data-action="activate" data-id="${engineer.id}" ${
                engineer.is_active ? 'disabled' : ''
              }>Make Active</button>
              <button class="btn btn-sm btn-outline-danger" data-action="delete" data-id="${engineer.id}">Delete</button>
            </td>
          `;

          engineersBody.appendChild(row);
        });

        renderWeekOverrideSelect();
      }

      function renderMonth() {
        calendarBody.innerHTML = '';

        if (!state.monthData) {
          return;
        }

        const monthDate = new Date(`${state.monthData.month}-01T00:00:00Z`);
        monthLabel.textContent = monthDate.toLocaleDateString('en-GB', {
          month: 'long',
          year: 'numeric',
          timeZone: 'UTC'
        });

        const jsWeekday = Number(state.monthData.month_start_weekday);
        const mondayBasedOffset = (jsWeekday + 6) % 7;

        const slots = [];
        for (let i = 0; i < mondayBasedOffset; i += 1) {
          slots.push(null);
        }

        state.monthData.days.forEach((day) => slots.push(day));

        while (slots.length % 7 !== 0) {
          slots.push(null);
        }

        for (let rowIndex = 0; rowIndex < slots.length; rowIndex += 7) {
          const tr = document.createElement('tr');
          const week = slots.slice(rowIndex, rowIndex + 7);

          week.forEach((day) => {
            const td = document.createElement('td');
            td.className = `calendar-cell${day ? '' : ' muted'}`;

            if (!day) {
              td.innerHTML = '&nbsp;';
              tr.appendChild(td);
              return;
            }

            td.innerHTML = `
              <div class="calendar-card d-flex flex-column gap-1">
                <div class="d-flex justify-content-between align-items-center">
                  <span class="day-number">${day.day}</span>
                  <button class="btn btn-sm btn-outline-secondary py-0 px-2" data-action="set-week" data-date="${day.date}">Week</button>
                </div>
                <div><strong>Base:</strong> ${day.base_engineer_name || 'Unassigned'}</div>
                <div><strong>Effective:</strong> ${day.effective_engineer_name || 'No on-call'}</div>
                <label>Day Override</label>
                <select class="form-select form-select-sm tiny-select" data-action="day-override-select" data-date="${day.date}">
                  ${engineerSelectOptions(day.override_engineer_id, true)}
                </select>
                <button class="btn btn-sm btn-warning" data-action="save-day-override" data-date="${day.date}">Save Day</button>
              </div>
            `;

            tr.appendChild(td);
          });

          calendarBody.appendChild(tr);
        }
      }

      function tickClock() {
        if (!state.clockServerMsAtSync || !state.clockLocalMsAtSync) {
          return;
        }

        const serverNow = state.clockServerMsAtSync + (Date.now() - state.clockLocalMsAtSync);
        const text = new Date(serverNow).toLocaleString('en-GB', {
          timeZone: 'Europe/London',
          hour12: false,
          year: 'numeric',
          month: '2-digit',
          day: '2-digit',
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit',
          timeZoneName: 'short'
        });

        digitalClock.textContent = text;
      }

      async function syncClock() {
        const payload = await apiFetch('/api/time');
        state.clockServerMsAtSync = payload.unix_ms;
        state.clockLocalMsAtSync = Date.now();
        clockSource.textContent = `clock source: ${payload.source}${payload.ntp_server ? ` (${payload.ntp_server})` : ''}`;
      }

      async function loadEngineers() {
        state.engineers = await apiFetch('/api/engineers');
        renderEngineers();
      }

      async function loadRotaConfig() {
        const config = await apiFetch('/api/rota/config');
        rotaStartDateInput.value = config.rota_start_date;
      }

      async function loadMonth(monthValue) {
        state.month = monthValue || state.month || toYearMonth(new Date());
        state.monthData = await apiFetch(`/api/rota/month?month=${encodeURIComponent(state.month)}`);
        renderMonth();
      }

      async function refreshAll() {
        try {
          setAlert('', 'info');
          await Promise.all([loadEngineers(), loadRotaConfig(), syncClock()]);
          await loadMonth(state.month || toYearMonth(new Date()));
        } catch (error) {
          setAlert(error.message, 'danger');
        }
      }

      async function addEngineer(name, mobileNumber) {
        await apiFetch('/api/engineers', {
          method: 'POST',
          body: JSON.stringify({ name, mobile_number: mobileNumber })
        });
      }

      async function updateEngineer(id, name, mobileNumber) {
        await apiFetch(`/api/engineers/${id}`, {
          method: 'PUT',
          body: JSON.stringify({ name, mobile_number: mobileNumber })
        });
      }

      async function deleteEngineer(id) {
        await apiFetch(`/api/engineers/${id}`, {
          method: 'DELETE'
        });
      }

      async function activateEngineer(id) {
        await apiFetch(`/api/engineers/${id}/activate`, { method: 'PUT' });
      }

      async function reorderEngineers(newOrderIds) {
        await apiFetch('/api/engineers/reorder', {
          method: 'PUT',
          body: JSON.stringify({ ordered_ids: newOrderIds })
        });
      }

      async function saveRotaStartDate() {
        await apiFetch('/api/rota/config', {
          method: 'PUT',
          body: JSON.stringify({ rota_start_date: rotaStartDateInput.value })
        });
      }

      async function saveDayOverride(date, engineerIdValue) {
        const engineerId = engineerIdValue ? Number(engineerIdValue) : null;
        await apiFetch('/api/rota/override/day', {
          method: 'PUT',
          body: JSON.stringify({ date, engineer_id: engineerId })
        });
      }

      async function saveWeekOverride(weekStart, engineerIdValue) {
        const engineerId = engineerIdValue ? Number(engineerIdValue) : null;
        await apiFetch('/api/rota/override/week', {
          method: 'PUT',
          body: JSON.stringify({ week_start: weekStart, engineer_id: engineerId })
        });
      }

      addEngineerForm.addEventListener('submit', async (event) => {
        event.preventDefault();

        try {
          const name = newEngineerName.value.trim();
          const mobile = normalizeUkMobileInput(newEngineerMobile.value);

          if (!name) {
            throw new Error('Please provide a name for the engineer.');
          }

          if (!mobile) {
            throw new Error('Please provide a valid UK mobile number.');
          }

          await addEngineer(name, mobile);
          newEngineerName.value = '';
          newEngineerMobile.value = '';
          setAlert('Engineer added successfully.', 'success');
          await refreshAll();
        } catch (error) {
          setAlert(error.message, 'danger');
        }
      });

      engineersBody.addEventListener('click', async (event) => {
        const button = event.target.closest('button[data-action][data-id]');
        if (!button) {
          return;
        }

        const action = button.dataset.action;
        const id = Number(button.dataset.id);
        const index = state.engineers.findIndex((engineer) => engineer.id === id);

        if (!Number.isInteger(id) || id <= 0 || index === -1) {
          return;
        }

        try {
          if (action === 'activate') {
            await activateEngineer(id);
            setAlert('Manual active engineer updated.', 'success');
          } else if (action === 'save') {
            const nameInput = engineersBody.querySelector(`input[data-field="name"][data-id="${id}"]`);
            const mobileInput = engineersBody.querySelector(`input[data-field="mobile"][data-id="${id}"]`);
            const normalizedMobile = normalizeUkMobileInput(mobileInput && mobileInput.value);

            if (!nameInput || !nameInput.value.trim()) {
              throw new Error('Name cannot be empty.');
            }

            if (!normalizedMobile) {
              throw new Error('Please enter a valid UK mobile number.');
            }

            await updateEngineer(id, nameInput.value.trim(), normalizedMobile);
            setAlert('Engineer updated successfully.', 'success');
          } else if (action === 'move-up' || action === 'move-down') {
            const updated = [...state.engineers];
            const swapIndex = action === 'move-up' ? index - 1 : index + 1;
            if (swapIndex < 0 || swapIndex >= updated.length) {
              return;
            }

            [updated[index], updated[swapIndex]] = [updated[swapIndex], updated[index]];
            await reorderEngineers(updated.map((engineer) => engineer.id));
            setAlert('Engineer order updated for rolling rota.', 'success');
          } else if (action === 'delete') {
            if (!window.confirm('Delete this engineer? This cannot be undone.')) {
              return;
            }

            await deleteEngineer(id);
            setAlert('Engineer deleted.', 'success');
          }

          await refreshAll();
        } catch (error) {
          setAlert(error.message, 'danger');
        }
      });

      calendarBody.addEventListener('click', async (event) => {
        const setWeekButton = event.target.closest('button[data-action="set-week"][data-date]');
        if (setWeekButton) {
          weekOverrideStart.value = toMonday(setWeekButton.dataset.date);
          return;
        }

        const saveButton = event.target.closest('button[data-action="save-day-override"][data-date]');
        if (!saveButton) {
          return;
        }

        const date = saveButton.dataset.date;
        const select = calendarBody.querySelector(`select[data-action="day-override-select"][data-date="${date}"]`);

        try {
          await saveDayOverride(date, select ? select.value : '');
          setAlert(`Override saved for ${date}.`, 'success');
          await loadMonth(state.month);
        } catch (error) {
          setAlert(error.message, 'danger');
        }
      });

      saveRotaStartBtn.addEventListener('click', async () => {
        try {
          await saveRotaStartDate();
          setAlert('Rota start date saved.', 'success');
          await loadMonth(state.month);
        } catch (error) {
          setAlert(error.message, 'danger');
        }
      });

      applyWeekOverrideBtn.addEventListener('click', async () => {
        try {
          const start = weekOverrideStart.value || toMonday(todayIso());
          await saveWeekOverride(start, weekOverrideEngineer.value);
          setAlert('Week override saved.', 'success');
          await loadMonth(state.month);
        } catch (error) {
          setAlert(error.message, 'danger');
        }
      });

      prevMonthBtn.addEventListener('click', async () => {
        try {
          state.month = shiftMonth(state.month || toYearMonth(new Date()), -1);
          await loadMonth(state.month);
        } catch (error) {
          setAlert(error.message, 'danger');
        }
      });

      nextMonthBtn.addEventListener('click', async () => {
        try {
          state.month = shiftMonth(state.month || toYearMonth(new Date()), 1);
          await loadMonth(state.month);
        } catch (error) {
          setAlert(error.message, 'danger');
        }
      });

      refreshBtn.addEventListener('click', () => {
        refreshAll();
      });

      weekOverrideStart.value = toMonday(todayIso());
      state.month = toYearMonth(new Date());
      setInterval(tickClock, 1000);
      setInterval(() => {
        syncClock().catch(() => {});
      }, 60000);
      refreshAll();
    </script>
  </body>
</html>
